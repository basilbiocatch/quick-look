# Build, push, and deploy quicklook-analytics to Cloud Run.
# Run from quicklook-analytics/: gcloud builds submit --config=cloudbuild.yaml
#
# Env vars in the release:
#   - GCP_PROJECT_ID, GEMINI_MODEL, GCS_BUCKET from --set-env-vars.
#   - QUICKLOOK_DB and GEMINI_API_KEY from Secret Manager. Create secrets once (see RELEASE.md and scripts/setup-gemini-secret.sh).
#
# _IMAGE_TAG defaults to "latest" for manual submit. For git tag: --substitutions=_IMAGE_TAG=$(git rev-parse --short HEAD)
substitutions:
  _IMAGE_TAG: "latest"
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/${PROJECT_ID}/quicklook-analytics:${_IMAGE_TAG}"
      - "."
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/${PROJECT_ID}/quicklook-analytics:${_IMAGE_TAG}"
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "quicklook-analytics"
      - "--image"
      - "gcr.io/${PROJECT_ID}/quicklook-analytics:${_IMAGE_TAG}"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},GEMINI_MODEL=gemini-2.0-flash,GCS_BUCKET=quicklook-chunks"
      - "--set-secrets=QUICKLOOK_DB=quicklook-db-uri:latest,GEMINI_API_KEY=gemini-api-key:latest"
      - "--project"
      - "${PROJECT_ID}"
images:
  - "gcr.io/${PROJECT_ID}/quicklook-analytics:${_IMAGE_TAG}"
