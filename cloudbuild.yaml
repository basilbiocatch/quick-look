# Build and deploy quicklook-server to Cloud Run.
# Run from repo root: ./release.sh production (which populates public/ then runs gcloud builds submit)
# Or: gcloud builds submit . --config=cloudbuild.yaml --substitutions=_REGION=us-central1,_SERVICE_NAME=quicklook-server

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: quicklook-server

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/quicklook/${_SERVICE_NAME}:${BUILD_ID}"
      - "-f"
      - "quicklook-server/Dockerfile"
      - "quicklook-server"
    id: "build"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/quicklook/${_SERVICE_NAME}:${BUILD_ID}"
    id: "push"
    waitFor: ["build"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/quicklook/${_SERVICE_NAME}:${BUILD_ID}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      # Update only these vars so existing QUICKLOOK_DB and JWT_SECRET (set in Console or via gcloud) are preserved.
      # First deploy: set QUICKLOOK_DB and JWT_SECRET in Console or: gcloud run services update quicklook-server --region=... --update-env-vars=QUICKLOOK_DB=...,JWT_SECRET=...
      # AWS_SECRET_ACCESS_KEY from Secret Manager (create once: quicklook-server/scripts/setup-aws-secret.sh).
      - "--update-env-vars"
      - "CHUNK_STORAGE=gcs,GCS_BUCKET=quicklook-chunks,GCP_PROJECT_ID=${PROJECT_ID},AWS_ACCESS_KEY_ID=AKIAJFGG6OFLTWBHBUZQ,AWS_REGION=us-east-1,SES_FROM=noreply@quicklook.io"
      - "--set-secrets=AWS_SECRET_ACCESS_KEY=aws-secret-access-key:latest"
    id: "deploy"
    waitFor: ["push"]

options:
  logging: CLOUD_LOGGING_ONLY
